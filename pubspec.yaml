name: todo_firebase_app
description: "Todo app with Firebase Auth + Realtime DB REST using clean architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_sign_in: ^6.3.0
  shared_preferences: ^2.3.3
  dio: ^5.9.0
  retrofit: ^4.7.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.6.0
  retrofit_generator: ^10.0.2
  freezed: ^3.2.3
  json_serializable: ^6.11.1

flutter:
  uses-material-design: true
